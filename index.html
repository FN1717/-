<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贪吃蛇</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="game-panel" aria-label="贪吃蛇游戏">
        <div class="topbar">
          <div class="title-block">
            <span class="eyebrow">Arcade Classic</span>
            <h1>贪吃蛇</h1>
            <p id="status">按方向键或 WASD 开始</p>
          </div>
          <div class="scoreboard" aria-label="分数">
            <span>分数 <strong id="score">0</strong></span>
            <span>最高 <strong id="best">0</strong></span>
          </div>
        </div>

        <div class="board-wrap">
          <canvas id="board" width="560" height="560" aria-label="游戏棋盘"></canvas>
          <div id="stateOverlay" class="state-overlay">
            <strong id="overlayTitle">准备开始</strong>
            <span id="overlayHint">方向键 / WASD 移动，空格暂停</span>
          </div>
        </div>

        <div class="controls">
          <button id="pauseButton" type="button">暂停</button>
          <button id="restartButton" type="button">重新开始</button>
        </div>

        <div class="mobile-pad" aria-label="移动端方向键">
          <button type="button" data-direction="up" aria-label="向上">↑</button>
          <button type="button" data-direction="left" aria-label="向左">←</button>
          <button type="button" data-direction="down" aria-label="向下">↓</button>
          <button type="button" data-direction="right" aria-label="向右">→</button>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
