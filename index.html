<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贪吃蛇</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="game-panel" aria-label="贪吃蛇游戏">
        <div class="topbar">
          <div>
            <h1>贪吃蛇</h1>
            <p id="status">按方向键或 WASD 开始</p>
          </div>
          <div class="scoreboard" aria-label="分数">
            <span>分数 <strong id="score">0</strong></span>
            <span>最高 <strong id="best">0</strong></span>
          </div>
        </div>

        <canvas id="board" width="560" height="560" aria-label="游戏棋盘"></canvas>

        <div class="controls">
          <button id="pauseButton" type="button">暂停</button>
          <button id="restartButton" type="button">重新开始</button>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
